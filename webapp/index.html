<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>AgentVisor</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #00d4ff;
      --accent-glow: rgba(0,212,255,0.35);
      --green:       #00e676;
      --yellow:      #ffb300;
      --red:         #ff5252;
      --surface:     rgba(255,255,255,0.07);
      --surface-hi:  rgba(255,255,255,0.13);
      --border:      rgba(255,255,255,0.09);
      --text:        #ffffff;
      --text-dim:    rgba(255,255,255,0.45);
      --radius-card: 14px;
      --radius-btn:  10px;
    }

    body {
      width: 600px;
      height: 600px;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, 'SF Pro Display', sans-serif;
      color: var(--text);
    }

    .view { display: none; width: 600px; height: 600px; padding: 28px 24px; }
    .view.active { display: flex; flex-direction: column; }

    .page-header { margin-bottom: 20px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--accent); }
    .page-sub   { font-size: 13px; color: var(--text-dim); margin-top: 3px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 18px;
    }

    .focusable {
      border: 2px solid transparent;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: all 120ms ease;
      outline: none;
    }
    .focusable:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: var(--surface-hi);
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-dim);
    }
    .dot.online   { background: var(--green);  box-shadow: 0 0 7px var(--green); }
    .dot.busy     { background: var(--yellow); box-shadow: 0 0 7px var(--yellow); }
    .dot.waiting  { background: var(--accent); box-shadow: 0 0 7px var(--accent); animation: pulse 1.2s infinite; }
    .dot.offline  { background: var(--text-dim); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ── VIEW: agents ── */
    #agents-list { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 8px; }
    .agent-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-card);
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .agent-row .agent-info { flex: 1; min-width: 0; }
    .agent-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-status-text { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .agent-type-badge {
      font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 5px;
      background: var(--surface-hi); color: var(--text-dim); flex-shrink: 0;
    }

    /* ── VIEW: conversations ── */
    #view-conversations { gap: 0; }
    #conv-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; flex-shrink: 0;
    }
    #conv-agent-name  { font-size: 17px; font-weight: 700; }
    #conv-agent-sub   { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
    #conversations-list {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
    }
    #conversations-list::-webkit-scrollbar { display: none; }
    .conv-row {
      display: flex; flex-direction: column; gap: 3px;
      padding: 12px 14px;
      border-radius: var(--radius-card);
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer;
    }
    .conv-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-meta { font-size: 11px; color: var(--text-dim); }

    /* ── VIEW: detail ── */
    #view-detail { gap: 8px; }
    #detail-header { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #detail-agent-name { font-size: 17px; font-weight: 700; }
    #detail-agent-status { font-size: 12px; color: var(--text-dim); }
    #messages-container {
      flex: 1; overflow: hidden;
      display: flex; flex-direction: column; gap: 8px;
    }
    #messages-list {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
    }
    #messages-list::-webkit-scrollbar { display: none; }

    /* ── Input area ── */
    #input-area {
      flex-shrink: 0; display: flex; flex-direction: column; gap: 6px;
      padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.08);
    }
    #preset-bar {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
    }
    #preset-bar::-webkit-scrollbar { display: none; }
    .preset-btn {
      flex-shrink: 0; padding: 7px 13px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
      color: var(--text); cursor: pointer; white-space: nowrap; outline: none;
    }
    .preset-btn:focus, .preset-btn:hover {
      border-color: var(--accent); background: rgba(0,212,255,0.12);
      color: var(--accent);
    }
    #desktop-input-row {
      display: none; gap: 8px; align-items: flex-end;
    }
    #desktop-msg-input {
      flex: 1; padding: 9px 13px; border-radius: 10px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
      color: #fff; font-size: 13px; outline: none; font-family: inherit;
      resize: none; min-height: 36px; max-height: 120px;
      overflow-y: auto; line-height: 1.4;
    }
    #desktop-msg-input:focus { border-color: var(--accent); }
    #btn-send-msg {
      padding: 9px 14px; border-radius: 10px; border: none; cursor: pointer;
      background: var(--accent); color: #000; font-size: 15px; font-weight: 700;
      flex-shrink: 0; height: 36px;
    }
    #btn-send-msg:hover { opacity: 0.85; }
    #btn-clear-input {
      width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer;
      background: rgba(255,255,255,0.1); color: var(--text-dim);
      font-size: 11px; flex-shrink: 0; transition: all 120ms ease;
      align-self: center;
    }
    #btn-clear-input:hover { background: rgba(255,82,82,0.2); color: var(--red); }
    #btn-voice {
      width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
      color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 120ms ease; outline: none;
    }
    #btn-voice:hover:not(:disabled) { background: rgba(255,255,255,0.13); }
    #btn-voice:disabled { opacity: 0.3; cursor: not-allowed; }
    #btn-voice.recording {
      background: rgba(255,82,82,0.15);
      border-color: var(--red);
      color: var(--red);
      animation: voice-pulse 1s ease-in-out infinite;
    }
    @keyframes voice-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,82,82,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(255,82,82,0); }
    }
    .msg {
      width: 100%; padding: 10px 12px 10px 14px;
      border-radius: 8px; border-left: 2px solid transparent;
      font-size: 13px; line-height: 1.6;
      font-family: 'SF Pro Text', -apple-system, sans-serif;
      position: relative;
    }
    .msg + .msg { margin-top: 2px; }
    .msg::before {
      display: block; font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 5px;
    }
    .msg.agent {
      background: rgba(255,255,255,0.04);
      border-left-color: var(--accent); color: var(--text);
    }
    .msg.agent::before { content: 'AGENT'; color: var(--accent); opacity: 0.7; }
    .msg.user {
      background: rgba(255,255,255,0.06);
      border-left-color: rgba(255,255,255,0.25); color: var(--text);
    }
    .msg.user::before { content: 'YOU'; }
    .msg.tool {
      background: rgba(255,179,0,0.06);
      border-left-color: var(--yellow); color: var(--text-dim); font-size: 12px;
    }
    .msg.tool::before { content: 'TOOL'; color: var(--yellow); opacity: 0.8; }

    /* ── Markdown content inside messages ── */
    .msg strong, .msg b { font-weight: 700; color: #fff; }
    .msg em { opacity: 0.85; font-style: italic; }
    .msg h1, .msg h2, .msg h3 {
      font-weight: 600; color: #fff; margin: 10px 0 4px;
    }
    .msg h1 { font-size: 16px; }
    .msg h2 { font-size: 15px; }
    .msg h3 { font-size: 14px; }
    .msg hr {
      border: none; border-top: 1px solid rgba(255,255,255,0.12);
      margin: 8px 0;
    }
    .msg code {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px; padding: 1px 5px;
      color: #a8d8ea;
    }
    .msg pre {
      overflow-x: auto;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 10px;
      margin: 6px 0; white-space: pre;
    }
    .msg pre code {
      background: none; border: none;
      padding: 0; font-size: 10px; color: #a8d8ea;
    }
    .msg a { color: var(--accent); text-decoration: underline; }
    .msg ul, .msg ol { padding-left: 18px; margin: 4px 0; }
    .msg ul { list-style: disc; }
    .msg ol { list-style: decimal; }
    .msg li { margin: 2px 0; }
    .msg p { margin: 4px 0; }
    .msg p:last-child { margin-bottom: 0; }

    /* ── VIEW: permission ── */
    #view-permission {
      justify-content: center; align-items: center;
      background: rgba(0,0,0,0.92);
    }
    .permission-card {
      width: 100%; max-width: 500px;
      border-radius: 18px; border: 1px solid rgba(0,212,255,0.3);
      background: rgba(0,30,45,0.95); padding: 28px;
      box-shadow: 0 0 40px rgba(0,212,255,0.15);
    }
    .permission-label {
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px;
    }
    .permission-agent { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
    .permission-tool {
      font-size: 13px; font-weight: 600; color: var(--yellow);
      background: rgba(255,179,0,0.1); border: 1px solid rgba(255,179,0,0.25);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; word-break: break-all;
    }
    .permission-detail {
      font-size: 12px; color: var(--text-dim);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 20px;
      max-height: 80px; overflow: hidden; word-break: break-all; line-height: 1.5;
    }
    .permission-actions { display: flex; gap: 10px; }
    .btn-approve, .btn-deny {
      flex: 1; padding: 14px; border-radius: 10px;
      font-size: 15px; font-weight: 700; text-align: center;
      border: 2px solid transparent; cursor: pointer; transition: all 120ms;
    }
    .btn-approve { background: rgba(0,230,118,0.12); border-color: rgba(0,230,118,0.3); color: var(--green); }
    .btn-approve:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,230,118,0.3); background: rgba(0,230,118,0.2); }
    .btn-deny { background: rgba(255,82,82,0.1); border-color: rgba(255,82,82,0.25); color: var(--red); }
    .btn-deny:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,82,82,0.25); background: rgba(255,82,82,0.2); }

    /* ── VIEW: loading ── */
    #view-loading { justify-content: center; align-items: center; gap: 14px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 14px; color: var(--text-dim); }
  </style>
</head>
<body>
<script src="config.js"></script>

<div id="view-loading" class="view active">
  <div class="spinner"></div>
  <div id="loading-text">Starting AgentVisor…</div>
</div>

<div id="view-agents" class="view">
  <div class="page-header">
    <div class="page-title">AgentVisor</div>
    <div class="page-sub" id="agents-sub">Loading agents…</div>
  </div>
  <div id="agents-list"></div>
</div>

<div id="view-conversations" class="view">
  <div id="conv-header">
    <div class="focusable btn-icon" id="btn-conv-back" tabindex="0">&#8592;</div>
    <div>
      <div id="conv-agent-name">Agent</div>
      <div id="conv-agent-sub">Sessions</div>
    </div>
    <div style="margin-left:auto">
      <div class="dot" id="conv-dot"></div>
    </div>
  </div>
  <div id="conversations-list"></div>
</div>

<div id="view-detail" class="view">
  <div id="detail-header">
    <div class="focusable btn-icon" id="btn-back" tabindex="0">&#8592;</div>
    <div>
      <div id="detail-agent-name">Agent</div>
      <div id="detail-agent-status">Idle</div>
    </div>
    <div style="margin-left:auto">
      <div class="dot" id="detail-dot"></div>
    </div>
  </div>
  <div id="messages-container">
    <div id="messages-list"></div>
  </div>
  <div id="input-area">
    <div id="preset-bar">
      <div class="preset-btn focusable" tabindex="0" data-msg="What are you currently working on? Give a one-sentence status update.">What are you doing?</div>
      <div class="preset-btn focusable" tabindex="0" data-msg="List all files you have modified, created, or deleted so far in this session.">Show changed files</div>
      <div class="preset-btn focusable" tabindex="0" data-msg="Summarize what you have accomplished so far and what still needs to be done.">Summarize progress</div>
      <div class="preset-btn focusable" tabindex="0" data-msg="Stop what you are doing. Write out a step-by-step plan of what you intend to do next before taking any action.">Stop, make a plan</div>
      <div class="preset-btn focusable" tabindex="0" data-msg="Revert the last change you made. If you used git, run git stash or undo the last edit and confirm what was reverted.">Undo last change</div>
      <div class="preset-btn focusable" tabindex="0" data-msg="Are you stuck or blocked? If yes, explain what the problem is and what you need from me to continue.">Are you stuck?</div>
    </div>
    <div id="desktop-input-row">
      <textarea id="desktop-msg-input" rows="1" placeholder="Type a message…" autocomplete="off"></textarea>
      <button id="btn-clear-input" title="Clear" aria-label="Clear input" style="display:none">&#10005;</button>
      <button id="btn-voice" title="Voice input" aria-label="Voice input">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="1" width="6" height="9" rx="3" fill="currentColor"/>
          <path d="M2.5 8a5.5 5.5 0 0 0 11 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <line x1="8" y1="13.5" x2="8" y2="15.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="btn-send-msg">&#8593;</button>
    </div>
  </div>
</div>

<div id="view-permission" class="view">
  <div class="permission-card">
    <div class="permission-label">Permission Request</div>
    <div class="permission-agent" id="perm-agent-name">Agent</div>
    <div class="permission-tool"  id="perm-tool-name">tool_name</div>
    <div class="permission-detail" id="perm-detail"></div>
    <div class="permission-actions">
      <div class="btn-approve focusable" id="btn-approve" tabindex="0">Allow (Enter)</div>
      <div class="btn-deny    focusable" id="btn-deny"    tabindex="0">Deny (Esc)</div>
    </div>
  </div>
</div>

<script>
// Configure marked.js (v5+ API — no deprecated options)
marked.use({ gfm: true, breaks: true });

const SUPABASE_URL  = window.GLASSDESK_CONFIG?.supabaseUrl  || '';
const SUPABASE_ANON = window.GLASSDESK_CONFIG?.supabaseAnon || '';

// ── State ─────────────────────────────────────────────────────
let currentView         = 'loading';
let supabaseClient      = null;
let agents              = [];
let activeAgentId       = null;
let conversations       = [];
let activeConversationId = null;
let pendingPermission   = null;
let realtimeChannels    = {};  // agentId → supabase RealtimeChannel
let _convLoadTimer      = null;

// ── View router ────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  currentView = name;
  requestAnimationFrame(() => restoreFocus(name));
}

function restoreFocus(view) {
  if (view === 'agents') {
    document.querySelector('#agents-list .focusable')?.focus();
  } else if (view === 'conversations') {
    const first = document.querySelector('#conversations-list .focusable');
    if (first) first.focus(); else document.getElementById('btn-conv-back')?.focus();
  } else if (view === 'detail') {
    document.getElementById('btn-back')?.focus();
  } else if (view === 'permission') {
    document.getElementById('btn-approve')?.focus();
  }
}

// ── Boot ───────────────────────────────────────────────────────
async function boot() {
  if (!SUPABASE_URL || !SUPABASE_ANON) {
    setLoading('Configuration missing — fill in config.js and redeploy.');
    return;
  }
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  setLoading('Connecting…');
  await loadAgents();
}

// ── Supabase REST ──────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  return fetch(`${SUPABASE_URL}${path}`, {
    ...opts,
    headers: {
      apikey: SUPABASE_ANON,
      Authorization: `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
}

async function loadAgents() {
  try {
    const res = await apiFetch('/rest/v1/bridge_agents?select=*&order=created_at.asc');
    if (!res.ok) throw new Error('Failed to load agents');
    agents = await res.json();
    renderAgents();
    subscribeAllAgents();
    showView('agents');
  } catch (e) {
    setLoading('Failed to connect. Press Enter to retry.');
  }
}

function renderAgents() {
  const list = document.getElementById('agents-list');
  const sub  = document.getElementById('agents-sub');
  sub.textContent = `${agents.length} agent${agents.length !== 1 ? 's' : ''}`;

  if (agents.length === 0) {
    list.innerHTML = '<div class="card" style="text-align:center;padding:32px;color:var(--text-dim)">No agents registered.<br>Run: node bridge/sync.js</div>';
    return;
  }

  list.innerHTML = agents.map((a, i) => `
    <div class="agent-row focusable" tabindex="0" data-agent-id="${a.id}" data-idx="${i}">
      <div class="dot ${statusToDot(a.status)}" id="dot-${a.id}"></div>
      <div class="agent-info">
        <div class="agent-name">${escHtml(a.name || 'Unnamed Agent')}</div>
        <div class="agent-status-text" id="status-${a.id}">${statusLabel(a.status)}</div>
      </div>
      <div class="agent-type-badge">${escHtml(a.agent_type)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.agent-row').forEach(row => {
    row.addEventListener('click', () => openAgent(row.dataset.agentId));
  });
}

function updateAgentRow(agentId, status) {
  const dot   = document.getElementById('dot-' + agentId);
  const label = document.getElementById('status-' + agentId);
  if (dot)   dot.className = 'dot ' + statusToDot(status);
  if (label) label.textContent = statusLabel(status);
}

function setLoading(msg) {
  document.getElementById('loading-text').textContent = msg;
}

// ── Realtime via supabase-js ───────────────────────────────────
function subscribeAllAgents() {
  agents.forEach(agent => {
    if (!realtimeChannels[agent.id]) subscribeAgent(agent);
  });
}

function subscribeAgent(agent) {
  const ch = supabaseClient.channel(`bridge:${agent.id}`, {
    config: { broadcast: { self: false } },
  });

  // Register one handler per event — supabase-js calls the handler with
  // { type, event, payload } where payload = the actual inner data.
  const on = (event, handler) => ch.on('broadcast', { event }, ({ payload }) => handler(payload));

  on('activity_state', (data) => {
    const { state, tool, permission_payload } = data;
    const ag = agents.find(a => a.id === agent.id);
    if (ag) ag.status = state;
    updateAgentRow(agent.id, state);

    if (state === 'awaiting_permission' && permission_payload) {
      showPermissionRequest(agent.id, tool, permission_payload);
    } else if (currentView === 'permission' && activeAgentId === agent.id) {
      showView('detail');
    }
    if (currentView === 'detail' && activeAgentId === agent.id) {
      document.getElementById('detail-agent-status').textContent = statusLabel(state);
      const dd = document.getElementById('detail-dot');
      if (dd) dd.className = 'dot ' + statusToDot(state);
    }
    if (currentView === 'conversations' && activeAgentId === agent.id) {
      const cd = document.getElementById('conv-dot');
      if (cd) cd.className = 'dot ' + statusToDot(state);
    }
  });

  on('agent_message', (data) => {
    if (currentView === 'detail' && activeAgentId === agent.id
        && (!activeConversationId || data.conversation_id === activeConversationId)) {
      appendMessage({ role: 'agent', content: data.content });
    }
  });

  on('user_message_ack', (data) => {
    if (currentView === 'detail' && activeAgentId === agent.id
        && (!activeConversationId || data.conversation_id === activeConversationId)) {
      appendMessage({ role: 'user', content: data.content });
    }
  });

  on('conversations_response', (data) => {
    if (activeAgentId !== agent.id) return;
    clearTimeout(_convLoadTimer);
    conversations = data.conversations || [];
    renderConversations();
    if (currentView !== 'conversations') showView('conversations');
  });

  on('history_response', (data) => {
    if (activeAgentId !== agent.id || data.conversation_id !== activeConversationId) return;
    const list = document.getElementById('messages-list');
    list.innerHTML = '';
    const msgs = data.messages || [];
    if (msgs.length === 0) {
      list.innerHTML = '<div class="msg agent" style="color:var(--text-dim)">No messages yet — listening for activity…</div>';
    } else {
      msgs.forEach(m => appendMessage({ role: m.role === 'user' ? 'user' : 'agent', content: m.content }));
    }
    showView('detail');
  });

  on('conversation_created', (data) => {
    if (data.agent_id !== agent.id) return;
    if (!conversations.find(c => c.id === data.conversation_id)) {
      conversations.unshift({
        id: data.conversation_id,
        title: data.title,
        created_at: data.created_at,
        workspace: data.workspace,
        agent_id: agent.id,
      });
      if (currentView === 'conversations' && activeAgentId === agent.id) renderConversations();
    }
  });

  on('bridge_presence', (_data) => {
    // Bridge just reconnected — retry fetch_conversations if we're waiting.
    if (activeAgentId === agent.id && currentView === 'conversations'
        && document.getElementById('conv-agent-sub').textContent === 'Loading sessions…') {
      requestConversations(agent.id);
    }
  });

  ch.subscribe((status) => {
    if (status === 'SUBSCRIBED') {
      // Channel ready — if we were waiting for conversations, request them now.
      if (activeAgentId === agent.id && currentView === 'conversations'
          && document.getElementById('conv-agent-sub').textContent === 'Loading sessions…') {
        requestConversations(agent.id);
      }
    }
  });

  realtimeChannels[agent.id] = ch;
}

// ── Send broadcast to bridge ───────────────────────────────────
function sendBroadcast(agentId, eventType, innerPayload = {}) {
  const ch = realtimeChannels[agentId];
  if (!ch) return false;
  ch.send({ type: 'broadcast', event: eventType, payload: innerPayload });
  return true;
}

// ── Conversations flow ─────────────────────────────────────────
function requestConversations(agentId) {
  clearTimeout(_convLoadTimer);
  sendBroadcast(agentId, 'fetch_conversations', { request_id: String(Date.now()) });
  // Retry after 4s in case bridge was reconnecting.
  _convLoadTimer = setTimeout(() => {
    if (activeAgentId === agentId && currentView === 'conversations'
        && document.getElementById('conv-agent-sub').textContent === 'Loading sessions…') {
      requestConversations(agentId);
    }
  }, 4000);
}

function openAgent(agentId) {
  const agent = agents.find(a => a.id === agentId);
  if (!agent) return;
  activeAgentId = agentId;
  activeConversationId = null;
  conversations = [];

  document.getElementById('conv-agent-name').textContent = agent.name || 'Agent';
  document.getElementById('conv-agent-sub').textContent = 'Loading sessions…';
  const cd = document.getElementById('conv-dot');
  if (cd) cd.className = 'dot ' + statusToDot(agent.status);

  document.getElementById('conversations-list').innerHTML =
    '<div class="card" style="text-align:center;padding:24px;color:var(--text-dim)">Loading sessions…</div>';

  showView('conversations');
  requestConversations(agentId);
}

function renderConversations() {
  const list = document.getElementById('conversations-list');
  const sub  = document.getElementById('conv-agent-sub');
  sub.textContent = `${conversations.length} session${conversations.length !== 1 ? 's' : ''}`;

  if (conversations.length === 0) {
    list.innerHTML = '<div class="card" style="text-align:center;padding:24px;color:var(--text-dim)">No sessions yet.<br>Use O in the bridge to attach one.</div>';
    return;
  }

  list.innerHTML = conversations.map(c => `
    <div class="conv-row focusable" tabindex="0" data-conv-id="${escHtml(c.id)}">
      <div class="conv-title">${escHtml(c.title || c.id.substring(0, 8))}</div>
      <div class="conv-meta">${escHtml(c.id.substring(0, 8))} · ${relativeTime(c.created_at)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.conv-row').forEach(row => {
    row.addEventListener('click', () => openConversation(row.dataset.convId));
  });
}

function openConversation(conversationId) {
  activeConversationId = conversationId;
  const conv  = conversations.find(c => c.id === conversationId);
  const agent = agents.find(a => a.id === activeAgentId);

  document.getElementById('detail-agent-name').textContent = conv?.title || conversationId.substring(0, 8);
  document.getElementById('detail-agent-status').textContent = statusLabel(agent?.status);
  const dd = document.getElementById('detail-dot');
  if (dd) dd.className = 'dot ' + statusToDot(agent?.status);

  document.getElementById('messages-list').innerHTML =
    '<div class="msg agent" style="color:var(--text-dim)">Loading messages…</div>';

  showView('detail');
  sendBroadcast(activeAgentId, 'fetch_history', {
    conversation_id: conversationId,
    request_id: String(Date.now()),
  });
}

function cleanContent(text) {
  if (!text) return '';
  return text
    // Remove <task-notification>...</task-notification> blocks
    .replace(/<task-notification[\s\S]*?<\/task-notification>/gi, '')
    // Remove <result>...</result> blocks (tool output)
    .replace(/<result[\s\S]*?<\/result>/gi, '')
    // Remove <usage>...</usage> blocks
    .replace(/<usage[\s\S]*?<\/usage>/gi, '')
    // Remove other XML-style metadata tags (self-closing or paired)
    .replace(/<total_tokens[\s\S]*?<\/total_tokens>/gi, '')
    .replace(/<tool_uses[\s\S]*?<\/tool_uses>/gi, '')
    .replace(/<duration_ms[\s\S]*?<\/duration_ms>/gi, '')
    // Strip any remaining unknown XML tags
    .replace(/<[a-z_][a-z0-9_-]*(?:\s[^>]*)?>[\s\S]*?<\/[a-z_][a-z0-9_-]*>/gi, '')
    .replace(/<[a-z_][a-z0-9_-]*(?:\s[^>]*)?\/>/gi, '')
    .trim();
}

function appendMessage(msg) {
  const list = document.getElementById('messages-list');
  const placeholder = list.querySelector('.msg[style]');
  if (placeholder) placeholder.remove();

  const cleaned = cleanContent(msg.content);
  if (!cleaned) return;

  const div = document.createElement('div');
  div.className = 'msg ' + msg.role;
  div.innerHTML = marked.parse(cleaned);
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}

// ── Permission ─────────────────────────────────────────────────
function showPermissionRequest(agentId, tool, payload) {
  const agent = agents.find(a => a.id === agentId);
  activeAgentId = agentId;
  pendingPermission = { agentId, tool, payload };

  document.getElementById('perm-agent-name').textContent = agent?.name || 'Agent';
  document.getElementById('perm-tool-name').textContent  = tool || 'Unknown tool';
  document.getElementById('perm-detail').textContent =
    typeof payload === 'string' ? payload : JSON.stringify(payload, null, 2).slice(0, 300);

  showView('permission');
}

async function respondToPermission(approved) {
  if (!pendingPermission) return;
  const { agentId } = pendingPermission;
  pendingPermission = null;
  sendBroadcast(agentId, 'permission_response', { approved });
  showView(activeConversationId ? 'detail' : 'conversations');
}

// ── Keyboard navigation ────────────────────────────────────────
const DPAD = { UP: 'ArrowUp', DOWN: 'ArrowDown', LEFT: 'ArrowLeft', RIGHT: 'ArrowRight', OK: 'Enter', BACK: 'Escape' };

function getFocusables() {
  return Array.from(document.querySelectorAll(`#view-${currentView} .focusable`));
}

function moveFocus(dir) {
  const focusables = getFocusables();
  if (!focusables.length) return;
  const idx = focusables.indexOf(document.activeElement);
  if (idx === -1) { focusables[0].focus(); return; }
  const isBack = dir === 'up' || dir === 'left';
  const next = isBack
    ? (idx > 0 ? idx - 1 : focusables.length - 1)
    : (idx < focusables.length - 1 ? idx + 1 : 0);
  focusables[next].focus();
}

document.addEventListener('keydown', (e) => {
  if (currentView === 'loading') {
    if (e.key === DPAD.OK) boot();
    e.preventDefault(); return;
  }
  if (currentView === 'permission') {
    if (e.key === DPAD.OK)   respondToPermission(true);
    if (e.key === DPAD.BACK) respondToPermission(false);
    if (e.key === DPAD.LEFT || e.key === DPAD.RIGHT) moveFocus(e.key === DPAD.LEFT ? 'left' : 'right');
    e.preventDefault(); return;
  }
  if (e.key === DPAD.UP)   moveFocus('up');
  if (e.key === DPAD.DOWN) moveFocus('down');
  if (e.key === DPAD.OK) {
    const el = document.activeElement;
    if (el?.classList.contains('focusable')) el.click();
  }
  if (e.key === DPAD.BACK) {
    if (currentView === 'detail')         { activeConversationId = null; showView('conversations'); }
    else if (currentView === 'conversations') { activeAgentId = null; showView('agents'); }
  }
  e.preventDefault();
});

// ── Utility ────────────────────────────────────────────────────
function statusToDot(s) {
  if (!s || s === 'offline') return 'offline';
  if (s === 'idle' || s === 'online') return 'online';
  if (s === 'awaiting_permission') return 'waiting';
  return 'busy';
}

function statusLabel(s) {
  const map = {
    offline: 'Offline', online: 'Online', idle: 'Idle',
    thinking: 'Thinking…', using_tool: 'Using tool',
    responding: 'Responding…', awaiting_permission: 'Waiting for approval',
    stop_requested: 'Stopping…',
  };
  return map[s] || s || 'Unknown';
}

function relativeTime(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ── User message input ─────────────────────────────────────────
function sendUserMessage(text) {
  if (!text?.trim() || !activeConversationId || !activeAgentId) return;
  appendMessage({ role: 'user', content: text.trim() });
  sendBroadcast(activeAgentId, 'user_message', {
    conversation_id: activeConversationId,
    content: text.trim(),
    user_id: 'local',
  });
}

function autoResizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function initInputArea() {
  // Preset buttons
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => sendUserMessage(btn.dataset.msg));
  });

  // Desktop input: show if not on glasses (no MetaWearable UA)
  const isGlasses = /MetaWearable/i.test(navigator.userAgent);
  if (!isGlasses) {
    document.getElementById('desktop-input-row').style.display = 'flex';
  }

  const msgInput = document.getElementById('desktop-msg-input');
  const btnSend  = document.getElementById('btn-send-msg');
  const btnVoice = document.getElementById('btn-voice');

  function submitInput() {
    const val = msgInput.value.trim();
    if (val) {
      sendUserMessage(val);
      msgInput.value = '';
      autoResizeInput(msgInput);
    }
  }

  // Auto-resize on input
  msgInput.addEventListener('input', () => autoResizeInput(msgInput));

  // Prevent dpad handler from eating keystrokes while typing.
  // Enter = send, Shift+Enter = new line.
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      submitInput();
      e.preventDefault();
    }
    e.stopPropagation();
  });

  btnSend.addEventListener('click', submitInput);

  // ── Voice input ──────────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    btnVoice.disabled = true;
    btnVoice.title = 'Spraakherkenning niet beschikbaar in deze browser';
    return;
  }

  let recognition    = null;
  let isRecording    = false;
  let shouldRestart  = false; // true while user hasn't explicitly stopped
  let accumulatedFinal = '';  // committed final text across restarts

  const btnClear = document.getElementById('btn-clear-input');

  // Show/hide clear button when textarea has content
  function updateClearBtn() {
    btnClear.style.display = msgInput.value.trim() ? 'block' : 'none';
  }
  msgInput.addEventListener('input', updateClearBtn);
  btnClear.addEventListener('click', () => {
    msgInput.value = '';
    accumulatedFinal = '';
    autoResizeInput(msgInput);
    updateClearBtn();
    msgInput.focus();
  });

  function buildRecognition(lang) {
    const r = new SpeechRecognition();
    r.lang            = lang;
    r.interimResults  = true;
    r.continuous      = true; // keep going until explicitly stopped

    r.addEventListener('result', (e) => {
      let sessionFinal = '';
      let interim      = '';
      for (const result of e.results) {
        if (result.isFinal) sessionFinal += result[0].transcript;
        else                interim      += result[0].transcript;
      }
      const full = accumulatedFinal + sessionFinal;
      msgInput.value = full + interim;
      autoResizeInput(msgInput);
      updateClearBtn();
      // Commit finals so next interim appends correctly
      if (sessionFinal) accumulatedFinal = full;
    });

    r.addEventListener('end', () => {
      // Auto-restart when browser cuts off, unless user stopped
      if (shouldRestart) {
        recognition = buildRecognition(r.lang);
        recognition.start();
        return;
      }
      isRecording = false;
      btnVoice.classList.remove('recording');
      // Trim any dangling interim residue
      msgInput.value = accumulatedFinal.trimEnd();
      autoResizeInput(msgInput);
      updateClearBtn();
      if (msgInput.value) msgInput.focus();
    });

    r.addEventListener('error', (e) => {
      if (e.error === 'language-not-supported' && r.lang !== 'en-US') {
        recognition = buildRecognition('en-US');
        recognition.start();
        return;
      }
      // On 'no-speech' or 'aborted' keep going if user hasn't stopped
      if (shouldRestart && e.error !== 'not-allowed' && e.error !== 'service-not-allowed') return;
      shouldRestart = false;
      isRecording   = false;
      btnVoice.classList.remove('recording');
    });

    return r;
  }

  function startRecording() {
    accumulatedFinal = msgInput.value;
    if (accumulatedFinal && !accumulatedFinal.endsWith(' ')) accumulatedFinal += ' ';
    shouldRestart = true;
    isRecording   = true;
    btnVoice.classList.add('recording');
    recognition = buildRecognition('nl-NL');
    recognition.start();
  }

  function stopRecording() {
    shouldRestart = false;
    if (recognition) recognition.stop();
  }

  btnVoice.addEventListener('click', () => {
    if (isRecording) stopRecording();
    else             startRecording();
  });
}

// ── Buttons ────────────────────────────────────────────────────
document.getElementById('btn-approve').addEventListener('click', () => respondToPermission(true));
document.getElementById('btn-deny').addEventListener('click',    () => respondToPermission(false));
document.getElementById('btn-back').addEventListener('click', () => {
  activeConversationId = null; showView('conversations');
});
document.getElementById('btn-conv-back').addEventListener('click', () => {
  activeAgentId = null; showView('agents');
});

initInputArea();
boot();
</script>
